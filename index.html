<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>IELTS Focus Pro | Mobile-First Skills Hub</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#0f0f0f',
            card: '#1a1a1a',
            accent: '#8b5cf6',
            text: '#e5e5e5',
            muted: '#737373'
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      background-color: #0f0f0f;
      color: #e5e5e5;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      margin: 0;
      padding: 0;
      padding-top: env(safe-area-inset-top);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* 3D Flip Card System */
    .flip-card-container {
      perspective: 1200px;
      cursor: pointer;
    }

    .flip-card {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card.flipped {
      transform: rotateY(180deg);
    }

    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      overflow: hidden;
    }

    .flip-front {
      background: linear-gradient(145deg, rgba(30, 30, 30, 0.95), rgba(20, 20, 20, 0.9));
      border: 1px solid rgba(139, 92, 246, 0.2);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.3),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }

    .flip-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899, #8b5cf6);
    }

    .flip-front::after {
      content: '';
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
    }

    .flip-back {
      background: linear-gradient(160deg, #1a1a2e, #0f0f1a);
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 0 40px rgba(139, 92, 246, 0.05) inset;
      transform: rotateY(180deg);
    }

    .flip-back::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #ec4899);
    }

    /* Card sizes responsive */
    @media (max-width: 500px) {
      .flip-card {
        aspect-ratio: 1;
      }
    }

    .flip-word {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .flip-translation {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: #e0e0e0;
      margin-bottom: 0.5rem;
    }

    .flip-pos-badge {
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .flip-hint {
      font-size: 0.6rem;
      color: #737373;
      position: absolute;
      bottom: 8px;
    }

    .flip-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 5;
      min-height: 28px;
      min-width: 28px;
    }

    .flip-delete:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .glitch-hover:hover {
      text-shadow: 2px 0 #8b5cf6, -2px 0 #ec4899;
      transition: 0.2s;
    }

    /* Custom scrollbar - modern thin */
    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: #0f0f0f;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 10px;
    }

    /* Mobile-optimized navigation */
    .nav-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), transparent);
      transition: width 0.3s ease;
    }

    .nav-btn:hover::before {
      width: 100%;
    }

    .nav-active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.05));
      border-left: 3px solid #8b5cf6;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.2);
    }

    /* Card animations */
    .skill-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }

    .skill-card:active {
      transform: scale(0.97);
    }

    .task-item {
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border-left: 3px solid transparent;
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.7), rgba(26, 26, 26, 0.4)) !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .task-item.task-reading {
      border-left-color: #60a5fa;
    }

    .task-item.task-writing {
      border-left-color: #f472b6;
    }

    .task-item.task-speaking {
      border-left-color: #4ade80;
    }

    .task-item.task-listening {
      border-left-color: #facc15;
    }

    .task-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      transition: width 0.3s ease;
    }

    .task-item:hover::after {
      width: 100%;
    }

    .task-item:active {
      transform: scale(0.98);
      background: rgba(139, 92, 246, 0.12) !important;
      box-shadow: 0 2px 16px rgba(139, 92, 246, 0.15);
    }

    /* Completed task state */
    .task-item.completed {
      opacity: 0.5;
      border-left-color: #22c55e;
    }

    .task-item.completed::before {
      content: '✓';
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      color: #22c55e;
      font-size: 1.1rem;
      font-weight: bold;
    }

    /* Toast animation */
    .toast-notify {
      animation: slideUpFade 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* Bottom navigation for mobile */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 15, 15, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(139, 92, 246, 0.15);
      padding: 0.5rem 0.25rem;
      padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
      justify-content: space-around;
      z-index: 100;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.6rem;
      transition: all 0.2s;
      color: #737373;
      padding: 0.4rem 0.2rem;
      min-width: 48px;
      min-height: 44px;
      justify-content: center;
      border-radius: 12px;
    }

    .bottom-nav-item.active {
      color: #8b5cf6;
      background: rgba(139, 92, 246, 0.1);
    }

    .bottom-nav-item i {
      font-size: 1.1rem;
    }

    /* Mobile goal panel */
    .mobile-goal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .mobile-goal-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 1.5rem;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 1px solid rgba(139, 92, 246, 0.3);
    }

    .mobile-goal-panel.open {
      transform: translateY(0);
    }

    .mobile-goal-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 0 auto 1rem;
    }

    @media (max-width: 768px) {
      .bottom-nav {
        display: flex;
      }

      main {
        padding: 1rem !important;
        padding-bottom: calc(80px + env(safe-area-inset-bottom)) !important;
        padding-top: 0.75rem !important;
      }

      .sidebar-desktop {
        display: none !important;
      }

      .skill-card {
        margin-bottom: 0.5rem;
      }

      /* Mobile typography adjustments */
      h2 {
        font-size: 1.5rem !important;
      }

      .task-item {
        padding: 0.875rem !important;
        border-radius: 0.75rem !important;
      }

      .task-item h3 {
        font-size: 0.85rem !important;
      }

      .task-item p {
        font-size: 0.75rem !important;
      }

      /* Vocabulary cards mobile */
      .flip-card {
        aspect-ratio: 1;
      }

      .flip-word {
        font-size: 1.2rem;
      }

      .flip-translation {
        font-size: 1.1rem;
      }

      .flip-face {
        padding: 1rem;
        border-radius: 1rem;
      }

      /* Sticky header mobile */
      .sticky {
        padding-top: 0.5rem !important;
        padding-bottom: 0.5rem !important;
      }

      /* Modal mobile fix */
      #wordModal .bg-card {
        margin: 0.5rem;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 1.25rem !important;
      }

      #wordModal input,
      #wordModal select,
      #wordModal textarea {
        font-size: 16px !important;
        /* prevents iOS zoom */
        padding: 0.75rem !important;
      }

      /* Grid two columns on phones */
      #vocabGrid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 0.65rem !important;
      }
    }

    /* Very small phones: still 2 cols but tighter */
    @media (max-width: 375px) {
      #vocabGrid {
        gap: 0.5rem !important;
      }

      .flip-word {
        font-size: 1rem;
      }

      .flip-translation {
        font-size: 0.9rem;
      }

      .flip-face {
        padding: 0.75rem;
      }
    }

    /* Very small phones (SE, mini etc) */
    @media (max-width: 375px) {
      .bottom-nav-item {
        font-size: 0.55rem;
        min-width: 40px;
      }

      .bottom-nav-item i {
        font-size: 1rem;
      }

      main {
        padding: 0.75rem !important;
      }

      h2 {
        font-size: 1.25rem !important;
      }
    }

    /* Medium phones landscape */
    @media (max-width: 768px) and (orientation: landscape) {
      .bottom-nav {
        padding: 0.35rem 0.5rem;
        padding-bottom: calc(0.35rem + env(safe-area-inset-bottom));
      }

      .bottom-nav-item i {
        font-size: 1rem;
      }

      main {
        padding-bottom: 60px !important;
      }
    }

    /* Floating action button */
    .fab {
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom));
      right: 16px;
      width: 52px;
      height: 52px;
      border-radius: 26px;
      background: linear-gradient(135deg, #8b5cf6, #a855f7);
      box-shadow: 0 4px 16px rgba(139, 92, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 90;
    }

    .fab:active {
      transform: scale(0.9);
    }

    @media (min-width: 769px) {
      .fab {
        display: none;
      }

      .mobile-goal-overlay,
      .mobile-goal-panel {
        display: none !important;
      }
    }

    /* Smooth transitions */
    .page-transition {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Progress ring */
    .progress-ring {
      transition: stroke-dashoffset 0.5s ease;
    }

    /* Touch-friendly buttons */
    button {
      min-height: 44px;
      min-width: 44px;
    }

    /* Pull-to-refresh prevention */
    body {
      overscroll-behavior-y: contain;
    }

    /* Staggered card entrance animation */
    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-animate {
      opacity: 0;
      animation: cardAppear 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Word detail modal */
    .word-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    .word-detail-card {
      background: linear-gradient(160deg, #1e1e2e, #15151f);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      position: relative;
      animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 0 80px rgba(139, 92, 246, 0.08);
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .word-detail-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }

    .word-detail-close:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    /* Search input */
    .search-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      color: white;
      font-size: 0.85rem;
      width: 100%;
      max-width: 280px;
      transition: all 0.25s;
      outline: none;
    }

    .search-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: #737373;
      font-size: 0.8rem;
    }

    /* Progress stats bar */
    .progress-stats {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Quiz modal */
    .quiz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .quiz-card {
      background: linear-gradient(160deg, #1a1a2e, #111118);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .quiz-word {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 1.5rem 0;
    }

    .quiz-answer {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .quiz-answer.revealed {
      opacity: 1;
      max-height: 200px;
    }

    /* Category Pack Cards */
    .pack-card {
      border-radius: 1.25rem;
      padding: 1.5rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .pack-card:active {
      transform: scale(0.96);
    }

    .pack-card .pack-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }

    .pack-card .pack-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.25rem;
    }

    .pack-card .pack-count {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255, 255, 255, 0.5);
    }

    .pack-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Back button */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #8b5cf6;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      border: none;
      padding: 0.5rem 0;
    }

    .back-btn:hover {
      color: #a78bfa;
    }

    @media (max-width: 768px) {
      .pack-card {
        padding: 1rem;
      }

      .pack-card .pack-emoji {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      .pack-card .pack-name {
        font-size: 0.8rem;
      }
    }

    /* Reading split layout — text left, questions right */
    .reading-split-layout {
      display: flex;
      gap: 1rem;
      height: calc(100vh - 140px);
      min-height: 400px;
    }

    .reading-text-panel {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 92, 246, 0.3) transparent;
    }

    .reading-questions-panel {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 92, 246, 0.3) transparent;
    }

    .reading-text-panel::-webkit-scrollbar,
    .reading-questions-panel::-webkit-scrollbar {
      width: 6px;
    }

    .reading-text-panel::-webkit-scrollbar-track,
    .reading-questions-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .reading-text-panel::-webkit-scrollbar-thumb,
    .reading-questions-panel::-webkit-scrollbar-thumb {

            text: `Margaret Preston's vibrant paintings and prints of Australian flowers, animals and landscapes have delighted the Australian public since the early 1920s.

Margaret Preston was born Margaret Rose McPherson in Port Adelaide, South Australia in 1875, the daughter of David McPherson, a Scottish marine engineer and his wife Prudence Lyle. She and her sister were sent at first to a private school, but when family circumstances changed, her mother took the girls to Sydney where Margaret attended a public high school. She decided early in life to become an artist and took private art lessons. In 1888, she trained for several months with Sydney landscape painter William Lister, and in 1893 enrolled at the National Gallery of Victoria Art School, where she studied for just over four years.

In 1898, after her father died, Margaret returned to Adelaide to study and then teach at the Adelaide School of Design. Her early artwork was influenced by the German aesthetic tradition, in which subjects of the natural world were depicted in a true to life manner.

Margaret's first visit to Europe in 1904, and her studies in Paris, France had little impact on this naturalism that dominated her work from this early period. However some eight years later, after returning to Paris, she began to recognise the decorative possibilities of art.

With the outbreak of the First World War, Margaret traveled to England, where she had exhibitions and continued her studies of art. She was a student of pottery, but at some time developed her interest in various techniques of printmaking and design. In England's West Country, she taught basket weaving at a rehabilitation unit for servicemen. It was on board a boat returning to Australia that she met wealthy businessman William Preston, whom she married in 1919. Together Margaret and William settled in the Sydney harbourside suburb of Mosman. The most characteristic prints from her early years in Sydney are views of boats floating on Sydney Harbour and of houses clustered on foreshore hills. Although Sydney was their home, the couple traveled regularly, both overseas and within Australia.

Her first major showing in Australia was with her friend Thea Proctor, in exhibitions in Melbourne and Sydney in 1925. Many of Preston's prints were hand-coloured in rich scarlet reds, blues and greens, and all of them were set in Chinese red lacquer frames. Harbour views were again prominent, but in comparison with earlier artworks, they were compact and busy. using striking contrasts of black and white combined with elaborate patterns and repetitions. Other prints from this period featured native flora. It was with these still-life subjects that she convinced the public that Australian native flowers were equal in beauty to any exotic species.

From 1932 to 1939, Preston moved away from Sydney and lived with her husband at Berowra, on the upper reaches of the Hawkesbury River. The area was one of rugged natural beauty, and for the first time Preston found herself living in a home surrounded bush. Prior to this, the native flowers that featured in her paintings and prints had been purchased from local florists; they now grew in abundance around her home. Preston's prints became larger, less complex and less reliant on the use of bright colours. Flowers were no longer arranged in vases, and Preston began to concentrate instead on flowers that were growing wild.

While living at Berowra, and undoubtedly prompted by the Aboriginal' rock engravings found near her property, Preston also developed what was to he a lifelong interest in Aboriginal art. On returning to Sydney in 1939, she became a member of the Anthropological Society of New South Wales, and later visited many important Aboriginal sites throughout Australia. Preston believed that Aboriginal art provided the key to establishing a national body of art that reflected the vast and ancient continent of Australia.

During the 1940s, symbols used by Aboriginal people, together with dried, burnt colours found in traditional Aboriginal paintings, became increasingly prominent in her prints. The artist's titles from this period frequently acknowledge her sources, and reveal the extent to which she drew inspiration from traditional Aboriginal art to create her own art.

It was in 1953, at the age of 78, that Preston produced her most significant prints. The exhibition at Macquarie Galleries in Sydney included 29 prints made using the ancient technique known as stenciling. Many of the artworks in the exhibition incorporated her fusion of Aboriginal and Chinese concepts. Preston had admired Chinese art since 1915, when she acquired the first of her many books on the subject, and she had visited China on two occasions. Chinese elements may be found in several of her earlier paintings.

However, in her prints of the 1950s, Preston combined Chinese ideas with her understanding of the Dreamtime' creation stories of Aboriginal Australians. Preston did not let age alter her habit of working hard. As she got older, her love of painting, printmaking and travel continued. By the time of her death in 1963, when she was 88, she had produced over 400 paintings and prints. In a career spanning almost 60 years, she created a body of work that demonstrates her extraordinary originality and the intensity of her commitment to Australian art.`,

            id: 2, title: 'The importance of law ⚖️',
            text: `A The law influences all of us virtually all the time, it governs almost all aspects of our behavior, and even what happens to us when we are no longer alive. It affects us from the embryo onwards. It governs the air we breathe, the food and drink we consume, our travel, family relationships, and our property. It applies at the bottom of the ocean and in space. Each time we examine a label on a food product, engage in work as an employee or employer, travel on the roads, go to school to learn or to teach, stay in a hotel, borrow a library book, create or dissolve a commercial company, play sports, or engage the services of someone for anything from plumbing a sink to planning a city, we are in the world of law.

B Law has also become much more widely recognised as the standard by which behavior needs to be judged. A very telling development in recent history is the way in which the idea of law has permeated all parts of social life. The universal standard of whether something is socially tolerated is progressively becoming whether it is legal, rather than something that has always been considered acceptable. In earlier times, most people were illiterate. Today, by contrast, a vast number of people can read, and it is becoming easier for people to take an interest in law, and for the general population to help actually shape the law in many countries. However, law is a versatile instrument that can be used equally well for the improvement or the degradation of humanity.

C This, of course, puts law in a very significant position. In our rapidly developing world, all sorts of skills and knowledge are valuable. Those people, for example, with knowledge of computers, the internet, and communications technology are relied upon by the rest of us. There is now someone with IT skills or an IT help desk in every UK school, every company, every hospital, every local and central government office. Without their knowledge, many parts of commercial and social life today would seize up in minutes. But legal understanding is just as vital and as universally needed. The American comedian Jerry Seinfeld put it like this, 'We are all throwing the dice, playing the game, moving our pieces around the board, but if there is a problem, the lawyer is the only person who has read the inside of the top of the box.' In other words, the lawyer is the only person who has read and made sense of the rules.

D The number of laws has never been greater. In the UK alone, about 35 new Acts of Parliament are produced every year, thereby delivering thousands of new rules. The legislative output of the British Parliament has more than doubled in recent times from 1,100 pages a year in the early 1970s, to over 2,500 pages a year today. Between 1997 and 2006, the legislature passed 365 Acts of Parliament and more than 32,000 legally binding statutory instruments. In a system with so much law, lawyers do a great deal not just to vindicate the rights of citizens and organizations but also to help develop the law through legal arguments, some of which are adapted by judges to become laws. Law courts can and do produce new law and revise old law, but they do so having heard the arguments of lawyers.

E However, despite their important role in developing the rules, lawyers are not universally admired. Anti-lawyer jokes have a long history going back to the ancient Greeks. More recently the son of a famous Hollywood actor was asked at his junior school what his father did for a living, to which he replied, 'My daddy is a movie actor, and sometimes he plays the good guy, and sometimes he plays the lawyer.' For balance, though, it is worth remembering that there are and have been many heroic and revered lawyers such as the Roman philosopher and politician Cicero and Mahatma Gandhi, the Indian campaigner for independence.

F People sometimes make comments that characterise lawyers as professionals whose concerns put personal reward above truth, or who gain financially from misfortune. There are undoubtedly lawyers that would fit that bill, just as there are some scientists, journalists and others in that category. But, in general, it is no more just to say that lawyers are bad because they make a living from people's problems than it is to make the same accusation in respect of nurses or IT consultants. A great many lawyers are involved in public law work, such as that involving civil liberties, housing and other issues. Such work is not lavishly remunerated and the quality of the service provided by these lawyers relies on considerable professional dedication. Moreover, much legal work has nothing to do with conflict or misfortune, but is primarily concerned with drafting documents. Another source of social disaffection for lawyers, and disaffection for the law, is a limited public understanding of how law works and how it could be changed. Greater clarity about these issues, maybe as a result of better public relations, would reduce many aspects of public dissatisfaction with the law.`,

            id: 3, title: 'William Gilbert and Magnetism 🧲',
            text: `A The 16th and 17th centuries saw two great pioneers of modern science: Galileo and Gilbert. The impact of their findings is eminent. Gilbert was the first modern scientist, also the accredited father of the science of electricity and magnetism, an Englishman of learning and a physician at the court of Elizabeth. Prior to him, all that was known of electricity and magnetism was what the ancients knew, nothing more than that the lodestone possessed magnetic properties and that amber and jet, when rubbed, would attract bits of paper or other substances of small specific gravity. However, he is less well known than he deserves.

B Gilbert's birth pre-dated Galileo. Born in an eminent local family in Colchester County in the UK, on May 24, 1544, he went to grammar school, and then studied medicine at St John's College, Cambridge, graduating in 1573. Later he travelled in the continent and eventually settled down in London.

C He was a very successful and eminent doctor. All this culminated in his election to the president of the Royal Science Society. He was also appointed personal physician to the Queen (Elizabeth I), and later knighted by the Queen. He faithfully served her until her death. However, he didn't outlive the Queen for long and died on November 30, 1603, only a few months after his appointment as personal physician to King James.

D Gilbert was first interested in chemistry but later changed his focus due to the large portion of mysticism of alchemy involved (such as the transmutation of metal). He gradually developed his interest in physics after the great minds of the ancient, particularly about the knowledge the ancient Greeks had about lodestones, strange minerals with the power to attract iron. In the meantime, Britain became a major seafaring nation in 1588 when the Spanish Armada was defeated, opening the way to British settlement of America. British ships depended on the magnetic compass, yet no one understood why it worked. Did the Pole Star attract it, as Columbus once speculated; or was there a magnetic mountain at the pole, as described in Odyssey, which ships would never approach, because the sailors thought its pull would yank out all their iron nails and fittings? For nearly 20 years, William Gilbert conducted ingenious experiments to understand magnetism. His works include On the Magnet, Magnetic Bodies, and the Great Magnet of the Earth.

E Gilbert's discovery was so important to modern physics. He investigated the nature of magnetism and electricity. He even coined the word "electric". Though the early beliefs of magnetism were also largely entangled with superstitions such as that rubbing garlic on lodestone can neutralise its magnetism, one example being that sailors even believed the smell of garlic would even interfere with the action of compass, which is why helmsmen were forbidden to eat it near a ship's compass. Gilbert also found that metals can be magnetised by rubbing materials such as fur, plastic or the like on them. He named the ends of a magnet "north pole" and "south pole". The magnetic poles can attract or repel, depending on polarity. In addition, however, ordinary iron is always attracted to a magnet. Though he started to study the relationship between magnetism and electricity, sadly he didn't complete it. His research of static electricity using amber and jet only demonstrated that objects with electrical charges can work like magnets attracting small pieces of paper and stuff. It is a French guy named du Fay that discovered that there are actually two electrical charges, positive and negative.

F He also questioned the traditional astronomical beliefs. Though a Copernican, he didn't express in his quintessential beliefs whether the earth is at the centre of the universe or in orbit around the sun. However, he believed that stars are not equidistant from the earth but have their own earth-like planets orbiting around them. The earth itself is like a giant magnet, which is also why compasses always point north. They spin on an axis that is aligned with the earth's polarity. He even likened the polarity of the magnet to the polarity of the earth and built an entire magnetic philosophy on this analogy. In his explanation, magnetism is the soul of the earth. Thus a perfectly spherical lodestone, when aligned with the earth's poles, would wobble all by itself in 24 hours. Further, he also believed that the sun and other stars wobble just like the earth does around a crystal core, and speculated that the moon might also be a magnet caused to orbit by its magnetic attraction to the earth. This was perhaps the first proposal that a force might cause a heavenly orbit.

G His research method was revolutionary in that he used experiments rather than pure logic and reasoning like the ancient Greek philosophers did. It was a new attitude towards scientific investigation. Until then, scientific experiments were not in fashion. It was because of this scientific attitude, together with his contribution to our knowledge of magnetism, that a unit of magneto motive force, also known as magnetic potential, was named Gilbert in his honour. His approach of careful observation and experimentation rather than the authoritative opinion or deductive philosophy of others had laid the very foundation for modern science.`,

            id: 4, title: 'Pacific navigation and voyaging 🌊',
            text: `How people migrated to the Pacific islands

A The many tiny islands of the Pacific Ocean had no human population until ancestors of today’s islanders sailed from Southeast Asia in ocean-going canoes approximately 2,000 years ago. At the present time, the debate continues about exactly how they migrated such vast distances across the ocean, without any of the modern technologies we take for granted.

B Although the romantic vision of some early twentieth-century writers of fleets of heroic navigators simultaneously setting sail had come to be considered by later investigators to be exaggerated, no considered assessment of Pacific voyaging was forthcoming until 1956 when the American historian Andrew Sharp published his research. Sharp challenged the ‘heroic vision’ by asserting that the expertise of the navigators was limited, and that the settlement of the islands was not systematic, being more dependent on good fortune by drifting canoes. Sharp’s theory was widely challenged, and deservedly so. If nothing else, however, it did spark renewed interest in the topic and precipitated valuable new research.

C Since the 1960s a wealth of investigations has been conducted, and most of them, thankfully, have been of the ‘non-armchair’ variety. While it would be wrong to denigrate all ‘armchair’ research - that based on an examination of available published materials - it has turned out that so little progress had been made in the area of Pacific voyaging because most writers relied on the same old sources - travelers’ journals or missionary narratives compiled by unskilled observers. After Sharp, this began to change, and researchers conducted most of their investigations not in libraries, but in the field.

D In 1965, David Lewis, a physician and experienced yachtsman, set to work using his own unique philosophy: he took the yacht he had owned for many years and navigated through the islands in order to contact those men who still find their way at sea using traditional methods. He then accompanied these men, in their traditional canoes, on test voyages from which all modern instruments were banished from sight, though Lewis secretly used them to confirm the navigator’s calculations. His most famous such voyage was a return trip of around 1,000 nautical miles between two islands in mid­ocean. Far from drifting, as proposed by Sharp, Lewis found that ancient navigators would have known which course to steer by memorizing which stars rose and set in certain positions along the horizon and this gave them fixed directions by which to steer their boats.

E The geographer Edwin Doran followed a quite different approach. He was interested in obtaining exact data on canoe sailing performance, and to that end employed the latest electronic instrumentation. Doran traveled on board traditional sailing canoes in some of the most remote parts of the Pacific, all the while using his instruments to record canoe speeds in different wind strengths - from gales to calms - the angle canoes could sail relative to the wind. In the process, he provided the first really precise attributes of traditional sailing canoes.

F A further contribution was made by Steven Horvath. As a physiologist, Horvath’s interest was not in navigation techniques or in canoes, but in the physical capabilities of the men themselves. By adapting standard physiological techniques, Horvath was able to calculate the energy expenditure required to paddle canoes of this sort at times when there was no wind to fill the sails, or when the wind was contrary. He concluded that paddles, or perhaps long oars, could indeed have propelled for long distances what were primarily sailing vessels.

G Finally, a team led by p Wall Garrard conducted important research, in this case by making investigations while remaining safely in the laboratory. Wall Garrard’s unusual method was to use the findings of linguists who had studied the languages of the Pacific islands, many of which are remarkably similar although the islands where they are spoken are sometimes thousands of kilometres apart. Clever adaptation of computer simulation techniques pioneered in other disciplines allowed him to produce convincing models suggesting the migrations were indeed systematic, but not simultaneous. Wall Garrard proposed the migrations should be seen not as a single journey made by a massed fleet of canoes, but as a series of ever more ambitious voyages, each pushing further into the unknown ocean.

H What do we learn about Pacific navigation and voyaging from this research? Quite correctly, none of the researchers tried to use their findings to prove one theory or another; experiments such as these cannot categorically confirm or negate a hypothesis. The strength of this research lay in the range of methodologies employed. When we splice together these findings we can propose that traditional navigators used a variety of canoe types, sources of water and navigation techniques, and it was this adaptability which was their greatest accomplishment. These navigators observed the conditions prevailing at sea at the time a voyage was made and altered their techniques accordingly. Furthermore, the canoes of the navigators were not drifting helplessly at sea but were most likely part of a systematic migration; as such, the Pacific peoples were able to view the ocean as an avenue, not a barrier, to communication before any other race on Earth. Finally, one unexpected but most welcome consequence of this research has been a renaissance in the practice of traditional voyaging. In some groups of islands in the Pacific today young people are resurrecting the skills of their ancestors, when a few decades ago it seemed they would be lost forever.

      if (!str) return '';
      return String(str).replace(/[&<>]/g, function (m) {

        if (m === '>') return '&gt;';
        return m;

    function openAddModal(catId) {
      const currentCat = catId || activeCategory || categories[0].id;
      const catOptions = categories.map(c =>
        `<option value="${c.id}" ${c.id === currentCat ? 'selected' : ''}>${c.emoji} ${c.name}</option>`
      ).join('');
      const modalHtml = `
                <div id="wordModal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-4" style="animation: fadeIn 0.2s;">
                    <div class="bg-card rounded-2xl max-w-md w-full p-6 border border-accent/30 shadow-2xl" style="animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);">
                        <h3 class="text-2xl font-bold mb-5 bg-gradient-to-r from-accent to-pink-500 bg-clip-text text-transparent">Новое слово</h3>
                        <select id="newCategory" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 mb-3 text-white focus:outline-none">

                        </select>
                        <input type="text" id="newWord" placeholder="English word" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 mb-3 text-white focus:outline-none focus:border-accent transition">
                        <input type="text" id="newTranslation" placeholder="Перевод (на русском)" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 mb-3 text-white focus:outline-none focus:border-accent transition">
                        <select id="newPos" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 mb-3 text-white focus:outline-none">
                            <option>Noun</option><option>Adjective</option><option>Verb</option><option>Adverb</option>
                        </select>
                        <input type="text" id="newEx" placeholder="Example sentence" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 mb-4 text-white focus:outline-none">
                        <div class="flex gap-3 justify-end">
                            <button id="closeModal" class="px-5 py-2 bg-white/10 rounded-full hover:bg-white/20 transition">Отмена</button>
                            <button id="saveWord" class="px-5 py-2 bg-gradient-to-r from-accent to-pink-500 rounded-full font-bold hover:shadow-lg transition">Сохранить</button>
                        </div>
                    </div>
                </div>
            `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      document.getElementById('closeModal')?.addEventListener('click', () => document.getElementById('wordModal')?.remove());
      document.getElementById('saveWord')?.addEventListener('click', () => {
        const word = document.getElementById('newWord').value.trim();
        const translation = document.getElementById('newTranslation').value.trim();
        const category = document.getElementById('newCategory').value;
        const pos = document.getElementById('newPos').value;
        const ex = document.getElementById('newEx').value.trim();
        if (word && translation) {
          vocabulary.push({ id: nextVocabId++, category, word, translation, pos, definition: '', example: ex || '' });
          saveVocabulary();
          if (activeCategory === category) {
            renderVocabCards(category);
          }

          showToast(`✅ "${word}" добавлено!`, "from-green-500 to-emerald-500");
        } else showToast("Слово и перевод обязательны", "from-red-500 to-orange-500");
      });
    }

    function renderSkillPacks(sectionTitle, icon, lessonsData, sectionType, iconColor) {
      if (activeSkillCategory) {
        const cat = lessonsData.find(c => c.id === activeSkillCategory);
        if (cat) {
          renderSkillLessonsList(sectionTitle, icon, cat, sectionType, iconColor);
          return;
        }
      }

      // Show category packs
      let html = `
        <div class="sticky top-0 bg-dark/80 backdrop-blur-md z-10 py-3 mb-4">
          <div class="flex items-center gap-3">
            <i class="fas ${icon} text-3xl ${iconColor}"></i>

              <h2 class="text-2xl md:text-3xl font-bold text-white">${sectionTitle}</h2>
              <p class="text-xs text-muted mt-1">${lessonsData.length} категорий • Выбери тему</p>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-5" id="skillPacksGrid"></div>`;
      document.getElementById('mainContent').innerHTML = html;

      const grid = document.getElementById('skillPacksGrid');
      grid.innerHTML = lessonsData.map((cat, idx) => {
        const delay = Math.min(idx * 80, 600);
        return `
          <div class="pack-card card-animate" style="background:${cat.gradient};animation-delay:${delay}ms" data-cat="${cat.id}">

          </div>`;

      document.querySelectorAll('.pack-card').forEach(el => {
        el.addEventListener('click', () => {
          activeSkillCategory = el.dataset.cat;
          loadSection(sectionType);
        });
      });

    function renderSkillLessonsList(sectionTitle, icon, cat, sectionType, iconColor) {
      let html = `
        <div class="sticky top-0 bg-dark/80 backdrop-blur-md z-10 py-3 mb-4">

            </div>
          </div>
        </div>
        <div class="space-y-3 pb-20" id="lessonsList"></div>`;
      document.getElementById('mainContent').innerHTML = html;

                </div>
              </div>
            </div>
            <div class="text-gray-200 text-sm leading-relaxed whitespace-pre-line" id="listeningTranscript">${escapeHtml(lesson.transcript)}</div>
          </div>
          <h3 class="text-lg font-bold mb-3 text-yellow-400"><i class="fas fa-question-circle"></i> Вопросы</h3>
          <div class="space-y-4" id="questionsBlock">
            ${(lesson.questions || []).map((q, qi) => `
              <div class="p-4 rounded-xl bg-white/5 border border-white/5">

                <div class="space-y-2">
                  ${q.options.map((opt, oi) => `
                    <button class="answer-btn w-full text-left px-4 py-2.5 rounded-lg bg-white/5 hover:bg-white/10 text-sm text-gray-300 transition-all border border-transparent" data-q="${qi}" data-o="${oi}" data-correct="${q.answer}">${String.fromCharCode(65 + oi)}. ${escapeHtml(opt)}</button>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>`;
      }

      // Timer for reading (declared early so template can reference readingScore)
      let readingTimerInterval = null;
      let readingStartTime = null;

      const fullHtml = `
        <div class="sticky top-0 bg-dark/80 backdrop-blur-md z-10 py-3 mb-4">
          <div class="flex items-center justify-between">
            <button class="back-btn" id="backToLessons"><i class="fas fa-arrow-left"></i> Назад</button>

              <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full">

                <button id="finishTestBtn" class="bg-gradient-to-r from-accent to-pink-500 text-white px-4 py-2 rounded-full font-bold text-sm hover:shadow-lg transition-all flex items-center gap-1.5">

      document.getElementById('mainContent').innerHTML = fullHtml;
      document.getElementById('mainContent').scrollTop = 0;

      // Start timer for reading
      if (type === 'reading') {
        readingStartTime = Date.now();
        // Count total questions
        readingScore.total = (lesson.questions || []).length
          + (lesson.tfngQuestions ? lesson.tfngQuestions.items.length : 0)
          + (lesson.multipleChoiceQuestions ? lesson.multipleChoiceQuestions.answers.length : 0)
          + (lesson.fillQuestions ? lesson.fillQuestions.items.length : 0);

        readingTimerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - readingStartTime) / 1000);
          const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
          const secs = String(elapsed % 60).padStart(2, '0');
          const timerEl = document.getElementById('readingTimer');
          if (timerEl) timerEl.textContent = `${mins}:${secs}`;
        }, 1000);
      }

      document.getElementById('backToLessons')?.addEventListener('click', () => {
        if (readingTimerInterval) clearInterval(readingTimerInterval);
        loadSection(type);
      });

      // Finish test button
      document.getElementById('finishTestBtn')?.addEventListener('click', () => {
        if (readingTimerInterval) clearInterval(readingTimerInterval);
        const elapsed = Math.floor((Date.now() - readingStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const timeStr = `${mins} мин ${secs} сек`;
        const pct = readingScore.total > 0 ? Math.round((readingScore.correct / readingScore.total) * 100) : 0;

        // IELTS band estimation
        let band, bandColor, emoji, message;
        if (pct >= 90) { band = '8.0–9.0'; bandColor = '#22c55e'; emoji = '🏆'; message = 'Отличный результат! Вы великолепно справились с тестом.'; }
        else if (pct >= 75) { band = '7.0–7.5'; bandColor = '#3b82f6'; emoji = '🌟'; message = 'Хороший результат! Вы хорошо понимаете тексты.'; }
        else if (pct >= 60) { band = '6.0–6.5'; bandColor = '#eab308'; emoji = '👍'; message = 'Неплохо! Есть над чем поработать, но база хорошая.'; }
        else if (pct >= 45) { band = '5.0–5.5'; bandColor = '#f97316'; emoji = '📚'; message = 'Средний результат. Рекомендуем больше практики чтения.'; }
        else { band = '4.0–4.5'; bandColor = '#ef4444'; emoji = '💪'; message = 'Нужно больше практики. Попробуйте перечитать текст внимательнее.'; }

        const overlay = document.getElementById('resultsOverlay');
        overlay.className = 'word-detail-overlay';
        overlay.innerHTML = `
          <div class="word-detail-card" style="max-width:480px;text-align:center">
            <div style="font-size:3.5rem;margin-bottom:0.5rem">${emoji}</div>
            <h2 style="font-size:1.5rem;font-weight:800;color:white;margin-bottom:0.25rem">Результаты теста</h2>
            <p style="font-size:0.8rem;color:#737373;margin-bottom:1.5rem">${escapeHtml(lesson.title)}</p>

            <div style="display:flex;gap:0.75rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap">
              <div style="background:rgba(255,255,255,0.05);border-radius:1rem;padding:1rem 1.25rem;min-width:100px">
                <p style="font-size:2rem;font-weight:800;color:${bandColor}">${readingScore.correct}/${readingScore.total}</p>
                <p style="font-size:0.65rem;color:#737373;text-transform:uppercase;letter-spacing:0.05em">Правильных</p>
              </div>
              <div style="background:rgba(255,255,255,0.05);border-radius:1rem;padding:1rem 1.25rem;min-width:100px">
                <p style="font-size:2rem;font-weight:800;color:${bandColor}">${pct}%</p>
                <p style="font-size:0.65rem;color:#737373;text-transform:uppercase;letter-spacing:0.05em">Точность</p>
              </div>
              <div style="background:rgba(255,255,255,0.05);border-radius:1rem;padding:1rem 1.25rem;min-width:100px">
                <p style="font-size:2rem;font-weight:800;color:#a78bfa">${timeStr}</p>
                <p style="font-size:0.65rem;color:#737373;text-transform:uppercase;letter-spacing:0.05em">Время</p>
              </div>
            </div>

            <div style="background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(236,72,153,0.1));border:1px solid rgba(139,92,246,0.2);border-radius:1rem;padding:1rem;margin-bottom:1.5rem">
              <p style="font-size:0.7rem;color:#737373;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.25rem">Примерный балл IELTS</p>
              <p style="font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,${bandColor},#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${band}</p>
            </div>

            <p style="font-size:0.85rem;color:#d1d5db;line-height:1.5;margin-bottom:1.5rem">${message}</p>

            <div style="display:flex;gap:0.75rem;justify-content:center">
              <button onclick="document.getElementById('resultsOverlay').classList.add('hidden')" style="background:rgba(255,255,255,0.08);color:white;border:none;padding:0.75rem 1.5rem;border-radius:999px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s">Посмотреть ответы</button>
              <button onclick="loadSection('reading')" style="background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;padding:0.75rem 1.5rem;border-radius:999px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s">Другой тест</button>
            </div>
          </div>
        `;
        recordTest('reading', readingScore.correct, readingScore.total);
        markLessonComplete('reading', activeSkillCategory, lesson.id);
        if (pct >= 75) launchConfetti();
        checkAndNotifyAchievements();
      });

      // Answer checking for reading/listening questions
      document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const correct = parseInt(btn.dataset.correct);
          const chosen = parseInt(btn.dataset.o);
          const qIdx = btn.dataset.q;
          // Disable all buttons for this question
          document.querySelectorAll(`.answer-btn[data-q="${qIdx}"]`).forEach(b => {
            b.disabled = true;
            b.style.opacity = '0.6';
            b.style.cursor = 'default';
            if (parseInt(b.dataset.o) === correct) {
              b.style.borderColor = '#22c55e';
              b.style.background = 'rgba(34, 197, 94, 0.15)';
              b.style.color = '#86efac';
            }
          });
          if (chosen !== correct) {
            btn.style.borderColor = '#ef4444';
            btn.style.background = 'rgba(239, 68, 68, 0.15)';
            btn.style.color = '#fca5a5';
            if (type === 'reading') readingScore._wrong = (readingScore._wrong || 0) + 1;
          } else {
            if (type === 'reading') readingScore.correct++;
          }
          if (type === 'reading') window._updateReadingProgress?.();
        });
      });

      // Fill-in-the-blank answer checking
      document.querySelectorAll('.fill-check-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const fi = btn.dataset.fi;
          const input = document.querySelector(`.fill-input[data-fi="${fi}"]`);
          const feedback = document.getElementById('fillFeedback' + fi);
          if (!input || !feedback) return;
          const userAnswer = input.value.trim().toLowerCase();
          const correctAnswer = input.dataset.answer.toLowerCase();
          feedback.classList.remove('hidden');
          if (userAnswer === correctAnswer) {
            input.style.borderColor = '#22c55e';
            input.style.background = 'rgba(34, 197, 94, 0.1)';
            feedback.textContent = '✅ Correct!';
            feedback.style.color = '#86efac';
            input.disabled = true;
            btn.disabled = true;
            btn.style.opacity = '0.5';
            if (type === 'reading') readingScore.correct++;
            window._updateReadingProgress?.();
          } else {
            input.style.borderColor = '#ef4444';
            input.style.background = 'rgba(239, 68, 68, 0.1)';
            feedback.textContent = '❌ Wrong. Correct answer: ' + input.dataset.answer;
            feedback.style.color = '#fca5a5';
            if (type === 'reading') { readingScore._wrong = (readingScore._wrong || 0) + 1; window._updateReadingProgress?.(); }
          }
        });
      });

      // Allow Enter key to submit fill-in answers
      document.querySelectorAll('.fill-input').forEach(input => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const fi = input.dataset.fi;
            document.querySelector(`.fill-check-btn[data-fi="${fi}"]`)?.click();
          }
        });
      });

      // Multiple choice (choose TWO/THREE) handler
      const mcSelected = new Set();
      const mcMaxAnswers = lesson.multipleChoiceQuestions ? lesson.multipleChoiceQuestions.answers.length : 2;
      document.querySelectorAll('.mc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const oi = parseInt(btn.dataset.oi);
          if (mcSelected.has(oi)) {
            mcSelected.delete(oi);
            btn.style.borderColor = 'transparent';
            btn.style.background = 'rgba(255,255,255,0.05)';
            btn.style.color = '#d1d5db';
          } else {
            if (mcSelected.size >= mcMaxAnswers) {
              showToast(`⚠️ Выберите только ${mcMaxAnswers} варианта`, 'from-yellow-500 to-orange-500');
              return;
            }
            mcSelected.add(oi);
            btn.style.borderColor = '#a78bfa';
            btn.style.background = 'rgba(139, 92, 246, 0.15)';
            btn.style.color = '#c4b5fd';
          }
        });
      });

      document.getElementById('checkMcBtn')?.addEventListener('click', () => {
        if (!lesson.multipleChoiceQuestions) return;
        const correctAnswers = lesson.multipleChoiceQuestions.answers;
        const feedback = document.getElementById('mcFeedback');
        const isCorrect = mcSelected.size === correctAnswers.length && correctAnswers.every(a => mcSelected.has(a));

        document.querySelectorAll('.mc-btn').forEach(btn => {
          const oi = parseInt(btn.dataset.oi);
          btn.disabled = true;
          btn.style.opacity = '0.7';
          btn.style.cursor = 'default';
          if (correctAnswers.includes(oi)) {
            btn.style.borderColor = '#22c55e';
            btn.style.background = 'rgba(34, 197, 94, 0.15)';
            btn.style.color = '#86efac';
          } else if (mcSelected.has(oi)) {
            btn.style.borderColor = '#ef4444';
            btn.style.background = 'rgba(239, 68, 68, 0.15)';
            btn.style.color = '#fca5a5';
          }
        });

        if (feedback) {
          feedback.classList.remove('hidden');
          if (isCorrect) {
            feedback.textContent = '✅ Правильно! Все ответы верны!';
            feedback.style.color = '#86efac';
            if (type === 'reading') readingScore.correct += correctAnswers.length;
          } else {
            if (type === 'reading') {
              correctAnswers.forEach(a => { if (mcSelected.has(a)) readingScore.correct++; });
              readingScore._wrong = (readingScore._wrong || 0) + (correctAnswers.length - [...mcSelected].filter(a => correctAnswers.includes(a)).length);
            }
            feedback.textContent = '❌ Неправильно. Правильные ответы выделены зелёным.';
            feedback.style.color = '#fca5a5';
          }
        }
        document.getElementById('checkMcBtn').disabled = true;
        document.getElementById('checkMcBtn').style.opacity = '0.5';
        if (type === 'reading') window._updateReadingProgress?.();
      });

      // TRUE/FALSE/NOT GIVEN handler
      document.querySelectorAll('.tfng-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const correct = parseInt(btn.dataset.correct);
          const chosen = parseInt(btn.dataset.to);
          const tIdx = btn.dataset.ti;
          document.querySelectorAll(`.tfng-btn[data-ti="${tIdx}"]`).forEach(b => {
            b.disabled = true;
            b.style.opacity = '0.6';
            b.style.cursor = 'default';
            if (parseInt(b.dataset.to) === correct) {
              b.style.borderColor = '#22c55e';
              b.style.background = 'rgba(34, 197, 94, 0.15)';
              b.style.color = '#86efac';
            }
          });
          if (chosen !== correct) {
            btn.style.borderColor = '#ef4444';
            btn.style.background = 'rgba(239, 68, 68, 0.15)';
            btn.style.color = '#fca5a5';
            if (type === 'reading') readingScore._wrong = (readingScore._wrong || 0) + 1;
          } else {
            if (type === 'reading') readingScore.correct++;
          }
          if (type === 'reading') window._updateReadingProgress?.();
        });
      });
      // Highlighter feature for reading
      if (type === 'reading') {
        let hlActive = false;
        let hlColor = 'hl-yellow';
        const textPanel = document.getElementById('readingTextPanel');
        const textContent = document.getElementById('readingTextContent');
        const hlToggle = document.getElementById('hlToggleBtn');
        const hlColors = document.getElementById('hlColors');
        const hlClear = document.getElementById('hlClearBtn');

        // Toggle highlighter mode
        hlToggle?.addEventListener('click', () => {
          hlActive = !hlActive;
          hlToggle.classList.toggle('active', hlActive);
          hlColors.style.display = hlActive ? 'flex' : 'none';
          hlClear.style.display = hlActive ? 'inline-flex' : 'none';
          textPanel?.classList.toggle('hl-mode', hlActive);
        });

        // Color selection
        document.querySelectorAll('.hl-color-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            hlColor = btn.dataset.hlColor;
            document.querySelectorAll('.hl-color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });

        // Clear all highlights
        hlClear?.addEventListener('click', () => {
          if (!textContent) return;
          const marks = textContent.querySelectorAll('mark');
          marks.forEach(m => {
            const textNode = document.createTextNode(m.textContent);
            m.parentNode.replaceChild(textNode, m);
          });
          textContent.normalize();
        });

        // Apply highlight on text selection
        textContent?.addEventListener('mouseup', () => {
          if (!hlActive) return;
          const selection = window.getSelection();
          if (!selection || selection.isCollapsed || selection.rangeCount === 0) return;

          const range = selection.getRangeAt(0);
          // Only highlight within textContent
          if (!textContent.contains(range.commonAncestorContainer)) return;

          const selectedText = selection.toString().trim();
          if (!selectedText) return;

          // Check if clicking on existing highlight to remove it
          const anchorNode = selection.anchorNode;
          if (anchorNode && anchorNode.parentElement && anchorNode.parentElement.tagName === 'MARK' && selectedText.length < 3) {
            const mark = anchorNode.parentElement;
            const textNode = document.createTextNode(mark.textContent);
            mark.parentNode.replaceChild(textNode, mark);
            textContent.normalize();
            selection.removeAllRanges();
            return;
          }

          try {
            const mark = document.createElement('mark');
            mark.className = hlColor;
            range.surroundContents(mark);

            // Click to remove highlight
            mark.addEventListener('click', (e) => {
              e.stopPropagation();
              const textNode = document.createTextNode(mark.textContent);
              mark.parentNode.replaceChild(textNode, mark);
              textContent.normalize();
            });
          } catch (e) {
            // surroundContents fails on partial selections across nodes
          }
          selection.removeAllRanges();
        });

        // Remove highlight on click
        textContent?.addEventListener('click', (e) => {
          if (e.target.tagName === 'MARK') {
            const textNode = document.createTextNode(e.target.textContent);
            e.target.parentNode.replaceChild(textNode, e.target);
            textContent.normalize();
          }
        });
      }
      // === WRITING features ===
      if (type === 'writing') {
        const isTask1w = (lesson.type || '').toLowerCase().includes('task 1');
        const minWords = isTask1w ? 150 : 250;
        const timerMinsW = isTask1w ? 20 : 40;
        let wTimerRunning = false, wTimerInterval = null, wTimeLeft = timerMinsW * 60;

        // Word counter
        document.getElementById('writingArea')?.addEventListener('input', (e) => {
          const text = e.target.value.trim();
          const count = text ? text.split(/\s+/).length : 0;
          const pill = document.getElementById('wordCountPill');
          const hint = document.getElementById('wordCountHint');
          if (pill) {
            pill.textContent = `${count} слов`;
            if (count >= minWords) { pill.className = 'wc-pill bg-green-500/20 text-green-400'; }
            else if (count >= minWords * 0.6) { pill.className = 'wc-pill bg-yellow-500/20 text-yellow-400'; }
            else { pill.className = 'wc-pill bg-white/10 text-gray-400'; }
          }
          if (hint) hint.textContent = count >= minWords ? '✅ Минимум достигнут!' : `Ещё ${minWords - count} слов до минимума`;
          // Auto-save essay
          saveEssay(`${type}_${lesson.id}`, e.target.value);
          if (count >= minWords) {
            markLessonComplete('writing', activeSkillCategory, lesson.id);
            checkAndNotifyAchievements();
          }
        });
        // Load saved essay
        const savedEssay = loadEssays()[`${type}_${lesson.id}`];
        if (savedEssay?.text) {
          const ta = document.getElementById('writingArea');
          if (ta) { ta.value = savedEssay.text; ta.dispatchEvent(new Event('input')); }
        }

        // Writing timer
        function updateWTimer() {
          const m = String(Math.floor(wTimeLeft / 60)).padStart(2, '0');
          const s = String(wTimeLeft % 60).padStart(2, '0');
          const el = document.getElementById('writingTimer');
          if (el) el.textContent = `${m}:${s}`;
          if (wTimeLeft <= 0) { clearInterval(wTimerInterval); wTimerRunning = false; showToast('⏰ Время вышло!', 'from-red-500 to-orange-500'); }
        }
        document.getElementById('writingTimerBtn')?.addEventListener('click', () => {
          const btn = document.getElementById('writingTimerBtn');
          if (!wTimerRunning) {
            wTimerRunning = true;
            btn.innerHTML = '<i class="fas fa-pause"></i> Пауза';
            wTimerInterval = setInterval(() => { wTimeLeft--; updateWTimer(); }, 1000);
          } else {
            wTimerRunning = false;
            btn.innerHTML = '<i class="fas fa-play"></i> Продолжить';
            clearInterval(wTimerInterval);
          }
        });
      }

      // === SPEAKING features ===
      if (type === 'speaking') {
        // Cue Card timer (2 min)
        let cueTimeLeft = 120, cueRunning = false, cueInterval = null;
        const circumference = 2 * Math.PI * 54;
        function updateCueTimer() {
          const m = Math.floor(cueTimeLeft / 60);
          const s = String(cueTimeLeft % 60).padStart(2, '0');
          const el = document.getElementById('cueTimerText');
          const circle = document.getElementById('cueTimerCircle');
          if (el) el.textContent = `${m}:${s}`;
          if (circle) {
            const pct = cueTimeLeft / 120;
            circle.setAttribute('stroke-dashoffset', String(circumference * (1 - pct)));
            circle.setAttribute('stroke', cueTimeLeft <= 10 ? '#ef4444' : '#22c55e');
          }
          if (cueTimeLeft <= 0) {
            clearInterval(cueInterval); cueRunning = false;
            showToast('⏰ 2 минуты прошли!', 'from-red-500 to-orange-500');
          }
        }
        document.getElementById('cueTimerStart')?.addEventListener('click', () => {
          if (!cueRunning) {
            cueRunning = true;
            cueInterval = setInterval(() => { cueTimeLeft--; updateCueTimer(); }, 1000);
          }
        });
        document.getElementById('cueTimerReset')?.addEventListener('click', () => {
          clearInterval(cueInterval); cueRunning = false; cueTimeLeft = 120; updateCueTimer();
        });

        // Voice recorder
        let mediaRecorder = null, audioChunks = [];
        document.getElementById('recBtn')?.addEventListener('click', async () => {
          const btn = document.getElementById('recBtn');
          const icon = document.getElementById('recIcon');
          const status = document.getElementById('recStatus');
          const audio = document.getElementById('recAudio');
          if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              mediaRecorder = new MediaRecorder(stream);
              audioChunks = [];
              mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
              mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                audio.src = URL.createObjectURL(blob);
                audio.style.display = 'block';
                stream.getTracks().forEach(t => t.stop());
              };
              mediaRecorder.start();
              btn.classList.add('recording');
              icon.className = 'fas fa-stop text-red-400 text-xl';
              status.textContent = '🔴 Запись...';
            } catch (e) { showToast('❌ Нет доступа к микрофону', 'from-red-500 to-orange-500'); }
          } else {
            mediaRecorder.stop();
            btn.classList.remove('recording');
            icon.className = 'fas fa-microphone text-green-400 text-xl';
            status.textContent = 'Запись сохранена ↓';
          }
        });
      }

      // === LISTENING features ===
      if (type === 'listening') {
        let ttsRate = 1;
        document.querySelectorAll('.speed-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            ttsRate = parseFloat(btn.dataset.speed);
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });
        document.getElementById('ttsPlayBtn')?.addEventListener('click', () => {
          const text = document.getElementById('listeningTranscript')?.textContent || '';
          if (!text) return;
          window.speechSynthesis.cancel();
          const utt = new SpeechSynthesisUtterance(text);
          utt.lang = 'en-US'; utt.rate = ttsRate;
          utt.onend = () => {
            document.getElementById('ttsPlayBtn').style.display = '';
            document.getElementById('ttsStopBtn').style.display = 'none';
          };
          window.speechSynthesis.speak(utt);
          document.getElementById('ttsPlayBtn').style.display = 'none';
          document.getElementById('ttsStopBtn').style.display = '';
        });
        document.getElementById('ttsStopBtn')?.addEventListener('click', () => {
          window.speechSynthesis.cancel();
          document.getElementById('ttsPlayBtn').style.display = '';
          document.getElementById('ttsStopBtn').style.display = 'none';
        });
      }

      // === READING progress bar update ===
      if (type === 'reading') {
        window._updateReadingProgress = () => {
          const answered = readingScore.correct + (readingScore._wrong || 0);
          const pct = readingScore.total > 0 ? Math.round((answered / readingScore.total) * 100) : 0;
          const fill = document.getElementById('readingProgressFill');
          const txt = document.getElementById('readingProgressText');
          if (fill) fill.style.width = pct + '%';
          if (txt) txt.textContent = `${answered}/${readingScore.total}`;
        };
        readingScore._wrong = 0;
      }

      // === Dictionary popup ===
      if (type === 'reading') {
        document.getElementById('readingTextContent')?.addEventListener('dblclick', async (e) => {
          const sel = window.getSelection();
          const word = sel?.toString().trim();
          if (!word || word.includes(' ')) return;
          document.querySelectorAll('.dict-popup').forEach(p => p.remove());
          const popup = document.createElement('div');
          popup.className = 'dict-popup';
          popup.innerHTML = `<p class="text-sm font-bold text-accent mb-1">${escapeHtml(word)}</p><p class="text-xs text-muted">Загрузка...</p>`;
          popup.style.left = e.clientX + 'px';
          popup.style.top = (e.clientY + 15) + 'px';
          document.body.appendChild(popup);
          try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            const entry = data[0];
            const meaning = entry.meanings[0];
            const def = meaning?.definitions[0]?.definition || 'No definition';
            const pos = meaning?.partOfSpeech || '';
            const phonetic = entry.phonetic || '';
            popup.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:start"><div><p class="text-sm font-bold text-accent">${escapeHtml(word)}</p><p class="text-xs text-muted">${phonetic} • ${pos}</p></div><button onclick="this.closest('.dict-popup').remove()" style="color:#737373;background:none;border:none;cursor:pointer;font-size:1rem">&times;</button></div><p class="text-xs text-gray-300 mt-2 leading-relaxed">${escapeHtml(def)}</p>`;
          } catch {
            popup.innerHTML = `<div style="display:flex;justify-content:space-between"><p class="text-sm text-gray-400">Слово не найдено</p><button onclick="this.closest('.dict-popup').remove()" style="color:#737373;background:none;border:none;cursor:pointer">&times;</button></div>`;
          }
          setTimeout(() => { document.addEventListener('click', function rm(ev) { if (!popup.contains(ev.target)) { popup.remove(); document.removeEventListener('click', rm); } }); }, 100);
        });
      }
    }

    // === MULTI-USER SYSTEM ===
    let currentUser = localStorage.getItem('ielts_current_user') || '';

    function getStorageKey(baseKey) {
      return currentUser ? `${baseKey}_${currentUser}` : baseKey;
    }

    // === PROFILE / localStorage ===
    const PROFILE_KEY_BASE = 'ielts_profile';
    function loadProfile() {
      try { return JSON.parse(localStorage.getItem(getStorageKey(PROFILE_KEY_BASE))) || {}; } catch { return {}; }
    }
    function saveProfile(data) {
      localStorage.setItem(getStorageKey(PROFILE_KEY_BASE), JSON.stringify(data));
    }
    function updateStreak() {
      const p = loadProfile();
      const today = new Date().toISOString().split('T')[0];
      if (p.lastDay === today) return;
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      if (p.lastDay === yesterday) { p.streak = (p.streak || 0) + 1; }
      else { p.streak = 1; }
      p.lastDay = today;
      p.totalDays = (p.totalDays || 0) + 1;
      saveProfile(p);
    }
    function recordTest(section, score, total) {
      const p = loadProfile();
      if (!p.tests) p.tests = [];
      p.tests.push({ section, score, total, date: new Date().toISOString() });
      p.testsCompleted = (p.testsCompleted || 0) + 1;
      saveProfile(p);
    }

    // === localStorage Persistence ===
    const VOCAB_KEY_BASE = 'ielts_vocab';
    const COMPLETED_KEY_BASE = 'ielts_completed';
    const ESSAYS_KEY_BASE = 'ielts_essays';
    const ACH_SEEN_KEY_BASE = 'ielts_ach_seen';

      try {
        const s = JSON.parse(localStorage.getItem(getStorageKey(VOCAB_KEY_BASE)));
        if (s && s.length > 0) {
          vocabulary = s;
          nextVocabId = Math.max(...vocabulary.map(v => v.id)) + 1;
        } else {
          vocabulary = JSON.parse(JSON.stringify(INITIAL_VOCABULARY));
          nextVocabId = 38;
        }
      } catch {
        vocabulary = JSON.parse(JSON.stringify(INITIAL_VOCABULARY));
        nextVocabId = 38;
      }
    }
    function markLessonComplete(type, catId, lessonId) {
      const c = loadCompleted();
      const k = `${type}_${catId}_${lessonId}`;
      if (!c.includes(k)) { c.push(k); localStorage.setItem(getStorageKey(COMPLETED_KEY_BASE), JSON.stringify(c)); }
    }
    function loadCompleted() { try { return JSON.parse(localStorage.getItem(getStorageKey(COMPLETED_KEY_BASE))) || []; } catch { return []; } }
    function isLessonDone(type, catId, lessonId) { return loadCompleted().includes(`${type}_${catId}_${lessonId}`); }
    function saveEssay(id, text) { const e = loadEssays(); e[id] = { text, date: new Date().toISOString() }; localStorage.setItem(getStorageKey(ESSAYS_KEY_BASE), JSON.stringify(e)); }
