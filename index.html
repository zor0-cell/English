    // === Achievements ===
    const achievementsDefs = [
      { id: 'first_flame', emoji: '🔥', title: 'First Flame', desc: 'Первый день в приложении', check: p => (p.totalDays || 0) >= 1 },
      { id: 'bookworm', emoji: '📚', title: 'Bookworm', desc: 'Пройти 5 тестов', check: p => (p.testsCompleted || 0) >= 5 },
      { id: 'sharpshooter', emoji: '🎯', title: 'Sharpshooter', desc: '100% на тесте', check: p => (p.tests || []).some(t => t.score === t.total && t.total > 0) },
      { id: 'week_warrior', emoji: '🗓', title: 'Week Warrior', desc: '7 дней подряд', check: p => (p.streak || 0) >= 7 },

      { id: 'writer', emoji: '✍️', title: 'Writer', desc: 'Написать 3 эссе', check: () => Object.keys(loadEssays()).length >= 3 },
    ];
    function getUnlockedAch() { const p = loadProfile(); return achievementsDefs.filter(a => a.check(p)); }
    function checkAndNotifyAchievements() {
      const unlocked = getUnlockedAch();
      const seen = JSON.parse(localStorage.getItem(getStorageKey(ACH_SEEN_KEY_BASE)) || '[]');
      const fresh = unlocked.filter(a => !seen.includes(a.id));

        fresh.forEach(a => showToast(`${a.emoji} ${a.title}!`, 'from-yellow-400 to-orange-500'));

    // === Confetti ===
    function launchConfetti() {
      const cols = ['#8b5cf6', '#ec4899', '#22c55e', '#3b82f6', '#eab308', '#ef4444'];

      const unlocked = getUnlockedAch();
      const completed = loadCompleted();
      const html = `

              <button id="logoutBtn" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 px-3 md:px-4 py-2 md:py-2.5 rounded-xl transition-all flex items-center gap-2 text-xs md:text-sm"><i class="fas fa-sign-out-alt"></i><span class="hidden md:inline"> Сменить</span></button>
            </div>

          <div class="dash-stat-card card-animate" style="animation-delay:160ms"><div style="font-size:2rem">✅</div><p class="text-2xl font-extrabold text-white mt-1">${tc}</p><p class="text-xs text-muted">Тестов</p></div>
          <div class="dash-stat-card card-animate" style="animation-delay:240ms"><div style="font-size:2rem">📊</div><p class="text-2xl font-extrabold text-white mt-1">${avg}%</p><p class="text-xs text-muted">Средний балл</p></div>
        </div>
        <h3 class="text-lg font-bold text-white mb-3"><i class="fas fa-bolt text-yellow-400"></i> Быстрый доступ</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">

          <div class="dash-quick-card card-animate" style="animation-delay:260ms;background:linear-gradient(135deg,rgba(244,114,182,0.15),rgba(244,114,182,0.05))" data-goto="writing"><i class="fas fa-pen-fancy text-2xl text-pink-400"></i><div><p class="font-bold text-white text-sm">Writing</p><p class="text-xs text-muted">${writingLessons.reduce((s, c) => s + c.lessons.length, 0)} уроков</p></div></div>
          <div class="dash-quick-card card-animate" style="animation-delay:340ms;background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05))" data-goto="speaking"><i class="fas fa-microphone-alt text-2xl text-green-400"></i><div><p class="font-bold text-white text-sm">Speaking</p><p class="text-xs text-muted">${speakingLessons.reduce((s, c) => s + c.lessons.length, 0)} уроков</p></div></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
          ${achievementsDefs.map((a, i) => { const u = unlocked.some(x => x.id === a.id); return `<div class="achievement-badge ${u ? 'unlocked' : 'locked'} card-animate" style="animation-delay:${i * 60}ms"><span style="font-size:1.75rem">${a.emoji}</span><div><p class="font-bold text-sm ${u ? 'text-white' : 'text-gray-500'}">${a.title}</p><p class="text-xs ${u ? 'text-gray-400' : 'text-gray-600'}">${a.desc}</p></div>${u ? '<i class="fas fa-check-circle text-green-400 ml-auto"></i>' : '<i class="fas fa-lock text-gray-600 ml-auto"></i>'}</div>`; }).join('')}

      document.getElementById('globalSearchBtn')?.addEventListener('click', openGlobalSearch);
      document.getElementById('logoutBtn')?.addEventListener('click', logoutUser);
      updateRealTimeClock();
    }

    // === Global Search ===
    function openGlobalSearch() {
      const h = `<div class="search-overlay" id="searchOverlay"><div style="position:relative;width:100%;max-width:500px"><i class="fas fa-search" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#737373"></i><input type="text" id="gsInput" class="search-global-input" placeholder="Искать слова, уроки..." autofocus></div><div class="search-results" id="gsResults"></div><button id="gsClose" style="position:fixed;top:1rem;right:1rem;background:rgba(255,255,255,0.08);border:none;color:#999;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center"><i class="fas fa-times"></i></button></div>`;
      document.body.insertAdjacentHTML('beforeend', h);
      document.getElementById('gsClose')?.addEventListener('click', () => document.getElementById('searchOverlay')?.remove());
      document.getElementById('searchOverlay')?.addEventListener('click', e => { if (e.target.id === 'searchOverlay') document.getElementById('searchOverlay')?.remove(); });
      const esc = e => { if (e.key === 'Escape') { document.getElementById('searchOverlay')?.remove(); document.removeEventListener('keydown', esc); } };
      document.addEventListener('keydown', esc);
      document.getElementById('gsInput')?.addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        const r = document.getElementById('gsResults');
        if (!q || q.length < 2) { r.innerHTML = '<p class="text-center text-muted text-sm py-8">Введите минимум 2 символа</p>'; return; }
        let items = [];
        vocabulary.filter(v => v.word.toLowerCase().includes(q) || v.translation.toLowerCase().includes(q)).slice(0, 6).forEach(v => items.push({ icon: 'fa-brain', color: 'text-accent', t: v.word, s: v.translation, fn: () => { document.getElementById('searchOverlay')?.remove(); activeCategory = v.category; loadSection('vocabulary'); } }));
        readingLessons.forEach(c => c.lessons.filter(l => l.title.toLowerCase().includes(q)).forEach(l => items.push({ icon: 'fa-book-open', color: 'text-blue-400', t: l.title, s: 'Reading • ' + c.title, fn: () => { document.getElementById('searchOverlay')?.remove(); activeSkillCategory = c.id; loadSection('reading'); } })));
        writingLessons.forEach(c => c.lessons.filter(l => l.title.toLowerCase().includes(q)).forEach(l => items.push({ icon: 'fa-pen-fancy', color: 'text-pink-400', t: l.title, s: 'Writing • ' + c.title, fn: () => { document.getElementById('searchOverlay')?.remove(); activeSkillCategory = c.id; loadSection('writing'); } })));
        speakingLessons.forEach(c => c.lessons.filter(l => l.title.toLowerCase().includes(q)).forEach(l => items.push({ icon: 'fa-microphone-alt', color: 'text-green-400', t: l.title, s: 'Speaking • ' + c.title, fn: () => { document.getElementById('searchOverlay')?.remove(); activeSkillCategory = c.id; loadSection('speaking'); } })));
        listeningLessons.forEach(c => c.lessons.filter(l => l.title.toLowerCase().includes(q)).forEach(l => items.push({ icon: 'fa-headphones', color: 'text-yellow-400', t: l.title, s: 'Listening • ' + c.title, fn: () => { document.getElementById('searchOverlay')?.remove(); activeSkillCategory = c.id; loadSection('listening'); } })));
        if (!items.length) { r.innerHTML = '<p class="text-center text-muted text-sm py-8"><i class="fas fa-search mb-2 text-2xl block"></i>Ничего не найдено</p>'; return; }
        r.innerHTML = items.map((it, i) => `<div class="search-result-item" data-si="${i}"><i class="fas ${it.icon} ${it.color}"></i><div><p class="text-sm font-medium">${escapeHtml(it.t)}</p><p class="text-xs text-muted">${escapeHtml(it.s)}</p></div></div>`).join('');
        document.querySelectorAll('.search-result-item').forEach(el => el.addEventListener('click', () => items[parseInt(el.dataset.si)]?.fn()));
      });
    }

    // === Matching Game ===
    function startMatchingGame(catId) {
      const cw = vocabulary.filter(v => v.category === (catId || activeCategory));
      if (cw.length < 4) { showToast('Нужно минимум 4 слова!', 'from-red-500 to-orange-500'); return; }
      const gw = [...cw].sort(() => Math.random() - 0.5).slice(0, Math.min(6, cw.length));
      const L = [...gw].sort(() => Math.random() - 0.5), R = [...gw].sort(() => Math.random() - 0.5);
      let sel = null, score = 0; const st = Date.now();
      const h = `<div class="word-detail-overlay" id="matchOverlay"><div class="word-detail-card" style="max-width:520px;padding:1.5rem"><button class="word-detail-close" id="closeMatch"><i class="fas fa-times"></i></button><h3 class="text-xl font-bold text-white mb-1"><i class="fas fa-puzzle-piece text-accent"></i> Matching Game</h3><p class="text-xs text-muted mb-4">Соедини слово с переводом</p><div class="flex items-center justify-between mb-4"><span class="wc-pill bg-accent/20 text-accent" id="mScore">0/${gw.length}</span><span class="wc-pill bg-white/10 text-gray-400" id="mTimer">0:00</span></div><div class="match-columns" id="mGrid"><div class="match-col">${L.map((w, i) => `<div class="match-card" data-s="l" data-i="${i}" data-wid="${w.id}">${escapeHtml(w.word)}</div>`).join('')}</div><div class="match-col">${R.map((w, i) => `<div class="match-card" data-s="r" data-i="${i}" data-wid="${w.id}">${escapeHtml(w.translation)}</div>`).join('')}</div></div></div></div>`;
      document.body.insertAdjacentHTML('beforeend', h);
      const ti = setInterval(() => { const e = Math.floor((Date.now() - st) / 1000); const el = document.getElementById('mTimer'); if (el) el.textContent = `${Math.floor(e / 60)}:${String(e % 60).padStart(2, '0')}`; }, 1000);
      document.getElementById('closeMatch')?.addEventListener('click', () => { clearInterval(ti); document.getElementById('matchOverlay')?.remove(); });
      document.querySelectorAll('#mGrid .match-card').forEach(card => {
        card.addEventListener('click', () => {
          if (card.classList.contains('correct')) return;
          const side = card.dataset.s, wid = parseInt(card.dataset.wid);
          if (!sel) { sel = { side, wid, el: card }; card.classList.add('selected'); }
          else if (sel.side === side) { sel.el.classList.remove('selected'); sel = { side, wid, el: card }; card.classList.add('selected'); }
          else {
            if (sel.wid === wid) { card.classList.remove('selected'); card.classList.add('correct'); sel.el.classList.remove('selected'); sel.el.classList.add('correct'); score++; document.getElementById('mScore').textContent = `${score}/${gw.length}`; if (score === gw.length) { clearInterval(ti); const el = Math.floor((Date.now() - st) / 1000); setTimeout(() => { launchConfetti(); showToast(`🎉 Все пары за ${el} сек!`, 'from-green-500 to-emerald-500'); setTimeout(() => document.getElementById('matchOverlay')?.remove(), 1500); }, 400); } sel = null; }
            else { card.classList.add('wrong'); sel.el.classList.add('wrong'); const pr = sel.el; setTimeout(() => { card.classList.remove('wrong', 'selected'); pr.classList.remove('wrong', 'selected'); }, 500); sel = null; }
          }
        });
      });
    }

    // Real time clock
    function updateRealTimeClock() {
      const p = document.getElementById('dashLiveTime');
      const h2 = document.getElementById('dashGreeting');
      if (!p || !h2) return;
      const now = new Date();
      const h = now.getHours();
      let greeting = 'Добрый вечер';
      let emoji = '🌆';
      if (h < 6) { greeting = 'Доброй ночи'; emoji = '🌙'; }
      else if (h < 12) { greeting = 'Доброе утро'; emoji = '☀️'; }
      else if (h < 18) { greeting = 'Добрый день'; emoji = '👋'; }

      const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = now.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });
      p.innerHTML = `<i class="far fa-clock text-accent/80"></i> <strong class="text-gray-200">${timeStr}</strong> <span class="text-gray-500 mx-1">•</span> <span class="capitalize text-gray-400">${dateStr}</span>`;
      if (!h2.dataset.greeted || h2.dataset.greeted !== greeting) {
        h2.innerHTML = `${greeting} <span class="text-accent">${emoji}</span>`;
        h2.dataset.greeted = greeting;
      }
    }

    // Navigation
    function setActiveNav(section) {
      document.querySelectorAll('.nav-btn, .bottom-nav-item').forEach(btn => {
        btn.classList.remove('nav-active', 'active');
        if (btn.dataset?.section === section) {
          btn.classList.add('nav-active');
          btn.classList.add('active');
        }
      });
    }

    function loadSection(section) {
      activeSection = section;
      setActiveNav(section);
      window.speechSynthesis?.cancel();
      if (section === 'dashboard') renderDashboard();
      else if (section === 'vocabulary') { activeSkillCategory = null; renderVocabularySection(); }
      else if (section === 'reading') renderSkillPacks('Reading Lab', 'fa-book-open', readingLessons, 'reading', 'text-blue-400');
      else if (section === 'writing') renderSkillPacks('Writing Flow', 'fa-pen-fancy', writingLessons, 'writing', 'text-pink-400');
      else if (section === 'speaking') renderSkillPacks('Speaking Studio', 'fa-microphone-alt', speakingLessons, 'speaking', 'text-green-400');
      else if (section === 'listening') renderSkillPacks('Listening Lab', 'fa-headphones', listeningLessons, 'listening', 'text-yellow-400');
      document.getElementById('mainContent')?.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Logic for Login
    function initLogin() {
      const overlay = document.getElementById('loginOverlay');
      const input = document.getElementById('usernameInput');
      const btn = document.getElementById('loginBtn');

      if (currentUser) {
        overlay.style.display = 'none';
        postLoginInit();
      } else {
        overlay.style.display = 'flex';
        setTimeout(() => input.focus(), 100);
      }

      const doLogin = () => {
        const val = input.value.trim();
        if (val) {
          currentUser = val;
          localStorage.setItem('ielts_current_user', currentUser);
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.style.display = 'none';
            postLoginInit();
            showToast(`👋 Добро пожаловать, ${currentUser}!`, 'from-accent to-pink-500');
          }, 300);
        } else {
          showToast('Пожалуйста, введите имя', 'from-red-500 to-orange-500');
        }
      };

      btn.addEventListener('click', doLogin);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    }

    function logoutUser() {
      localStorage.removeItem('ielts_current_user');
      location.reload();
    }

    // Post Login Initialize
    function postLoginInit() {
      loadSavedVocabulary();
      updateStreak();
      updateRealTimeClock();
      setInterval(updateRealTimeClock, 1000);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }
      loadSection('dashboard');
      setTimeout(checkAndNotifyAchievements, 1500);

      document.querySelectorAll('.nav-btn, .bottom-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const section = btn.dataset.section;
          if (section) {
            activeSkillCategory = null;
            loadSection(section);
          }
        });
      });

      document.getElementById('fabButton')?.addEventListener('click', () => {
        if (activeSection === 'vocabulary') openAddModal();
        else showToast('Перейди в Vocabulary для добавления', 'from-accent to-pink-500');
      });
    }

    function init() {
      initLogin();
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
